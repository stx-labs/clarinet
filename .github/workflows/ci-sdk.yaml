name: CI - Clarinet SDK
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/CHANGELOG.md"
  push:
    branches:
      - main
    paths-ignore:
      - "**/CHANGELOG.md"

# Cancel previous runs for the same workflow
permissions: {}

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  build_wasm:
    name: Build and test Wasm packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RUSTFLAGS: "-Dwarnings"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy --target wasm32-unknown-unknown

      - name: Setup cache keys
        id: rust-version
        run: |
          RUST_VERSION=$(rustc -vV | shasum -a 256 | cut -d ' ' -f1)
          echo "hash=$RUST_VERSION" >> $GITHUB_OUTPUT

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24.x"

      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-${{ github.job }}-${{ steps.rust-version.outputs.hash }}-${{ hashFiles('./Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-${{ steps.rust-version.outputs.hash }}-
            ${{ runner.os }}-${{ github.job }}-

      - name: Run clippy
        run: cargo clippy --package clarinet-sdk-wasm --target wasm32-unknown-unknown

      - name: Install wasm-pack if not available
        run: |
          if ! command -v wasm-pack &> /dev/null; then
            cargo install wasm-pack
          fi

      - name: Build Wasm packages
        run: pnpm run build:sdk-wasm

      - name: Run wasm-bindgen-test
        run: wasm-pack test --node components/clarinet-sdk-wasm

      - name: Upload Wasm artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wasm-artifacts
          path: components/clarinet-sdk-wasm/pkg-*

  test:
    name: Run clarinet-sdk tests
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    environment: ci
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22.x, 24.x]
    needs: build_wasm
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Download Wasm artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: wasm-artifacts
          path: components/clarinet-sdk-wasm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        env:
          HIRO_API_KEY: ${{ secrets.HIRO_API_KEY }}
        run: pnpm run test
