# The clarinet-sdk is published to npm when a release is created.
# It's based on the npm workspace defined in the package.json at the root of the project.
# Two packages are built with wasm-pack - @stacks/clarinet-sdk-wasm and @stacks/clarinet-sdk-wasm-browser
# They need to be built first
# Then two packages are built with tsc - @stacks/clarinet-sdk and @stacks/clarinet-sdk-browser


name: Publish Clarinet SDK
on:
  release:
    types: [published]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt --target wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build Wasm packages
        run: npm run build:sdk-wasm

      - name: Publish sdk-wasm package
        run: npm publish -w components/clarinet-sdk-wasm/pkg-node -w components/clarinet-sdk-wasm/pkg-browser --access public

      - name: Install dependencies
        run: npm ci

      - name: Build sdk package
        run: npm run build:sdk

      - name: Publish sdk package
        run: npm publish -w components/clarinet-sdk/node -w components/clarinet-sdk/browser --access public
