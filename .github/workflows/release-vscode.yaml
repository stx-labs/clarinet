# The vscode extension is published to npm when a release is created.
# It's built with vsce and published to both the vscode marketplace and open vsx.

name: Publish VSCode Extension
on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

defaults:
  run:
    working-directory: ./components/clarity-vscode

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal --target wasm32-unknown-unknown
          cargo install wasm-pack

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build vsix
        run: pnpm exec vsce package --out clarity.vsix

      - name: Upload vsix artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clarity-vsix
          path: ./components/clarity-vscode/clarity.vsix
          if-no-files-found: error
          retention-days: 7

  publish-vscode-marketplace:
    name: Publish to VSCode Marketplace
    runs-on: ubuntu-latest
    needs: build
    environment: release-vscode-extension

    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.x'

      - name: Download vsix artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: clarity-vsix
          path: ./components/clarity-vscode

      - name: Publish to VSCode Marketplace
        if: github.event_name == 'release'
        env:
          VSCE_PAT: ${{ secrets.VSCE_TOKEN }}
        run: npx -y @vscode/vsce@3.9.1 publish --packagePath clarity.vsix --pat "$VSCE_PAT"

  publish-open-vsx:
    name: Publish to Open VSX
    runs-on: ubuntu-latest
    needs: build
    environment: release-vscode-extension

    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.x'

      - name: Download vsix artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: clarity-vsix
          path: ./components/clarity-vscode

      - name: Publish to Open VSX
        if: github.event_name == 'release'
        env:
          OVSX_PAT: ${{ secrets.OVSX_TOKEN }}
        run: npx -y ovsx@0.10.12 publish --packagePath clarity.vsix --pat "$OVSX_PAT"
